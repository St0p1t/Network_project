services:
  app:
    build: .
    expose:
      - "8000"
    restart: unless-stopped
    # One worker is intentional: the asyncio sim-loop must be single-process
    # (boids/flora/events live in memory; multi-worker would create separate worlds)

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
